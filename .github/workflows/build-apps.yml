name: Build Desktop Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false # Prevents one OS failure from cancelling the others
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45 # Prevents the "Canceled" error by giving extra time for downloads

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        # Using 3.12 (without .8) ensures it uses the pre-cached version on the runner.
        # This fixes the extraction hang you experienced.
        python-version: "3.12"
        cache: 'pip' 

    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libqt6core6 libqt6gui6 libqt6widgets6

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wheel setuptools
        
        # Install Interviewee requirements
        if [ -f "interviewee_side/requirements.txt" ]; then 
          pip install -r interviewee_side/requirements.txt
        fi
        
        # Install Interviewer requirements
        if [ -f "interviewer_side/AIHiringAssistant/requirements.txt" ]; then 
          pip install -r interviewer_side/AIHiringAssistant/requirements.txt
        fi
      shell: bash

    - name: Build Apps
      run: |
        # Build Interviewee
        cd interviewee_side
        pyinstaller --name "IntervieweePortal" --windowed --noconfirm main.py
        cd ..
        
        # Build Interviewer
        cd interviewer_side/AIHiringAssistant
        pyinstaller --name "InterviewerApp" --windowed --noconfirm main.py
      shell: bash

    # Special handling for macOS: Zipping .app folders preserves permissions
    - name: Prepare macOS Artifacts
      if: runner.os == 'macOS'
      run: |
        cd interviewee_side/dist
        zip -r ../../IntervieweePortal-Mac.zip IntervieweePortal.app
        cd ../../interviewer_side/AIHiringAssistant/dist
        zip -r ../../../InterviewerApp-Mac.zip InterviewerApp.app
      shell: bash

    - name: Upload Interviewee Artifact
      uses: actions/upload-artifact@v4
      with:
        name: IntervieweePortal-${{ matrix.os }}
        path: |
          interviewee_side/dist/IntervieweePortal
          IntervieweePortal-Mac.zip

    - name: Upload Interviewer Artifact
      uses: actions/upload-artifact@v4
      with:
        name: InterviewerApp-${{ matrix.os }}
        path: |
          interviewer_side/AIHiringAssistant/dist/InterviewerApp
          InterviewerApp-Mac.zip