name: Build Desktop Apps

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-glx libqt6core6 libqt6gui6 libqt6widgets6

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller wheel setuptools
        
        # Install Interviewee requirements
        if [ -f "interviewee_side/requirements.txt" ]; then pip install -r interviewee_side/requirements.txt; fi
        
        # Install Interviewer requirements
        if [ -f "interviewer_side/AIHiringAssistant/requirements.txt" ]; then pip install -r interviewer_side/AIHiringAssistant/requirements.txt; fi
      shell: bash

    - name: Build Interviewee App
      run: |
        cd interviewee_side
        pyinstaller --name "IntervieweePortal" --windowed --noconfirm main.py
      shell: bash

    - name: Build Interviewer App
      run: |
        cd interviewer_side/AIHiringAssistant
        pyinstaller --name "InterviewerApp" --windowed --noconfirm main.py
      shell: bash

    - name: Upload Interviewee Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: IntervieweePortal-Windows
        path: interviewee_side/dist/IntervieweePortal

    - name: Upload Interviewer Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: InterviewerApp-Windows
        path: interviewer_side/AIHiringAssistant/dist/InterviewerApp

    - name: Upload Interviewee Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: IntervieweePortal-Mac
        path: interviewee_side/dist/IntervieweePortal.app

    - name: Upload Interviewer Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: InterviewerApp-Mac
        path: interviewer_side/AIHiringAssistant/dist/InterviewerApp.app

    - name: Upload Interviewee Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: IntervieweePortal-Linux
        path: interviewee_side/dist/IntervieweePortal

    - name: Upload Interviewer Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: InterviewerApp-Linux
        path: interviewer_side/AIHiringAssistant/dist/InterviewerApp
